# Mid-rank clones for the Criminal, Freedom, and Duty factions. Same gear,
# access, band, and faction as their parents (StalkerBandit / StalkerFreedom /
# StalkerDolg) — they exist as separate selectable slots in the character
# creation menu.

- type: job
  id: StalkerCutthroat
  name: job-cutthroat
  icon: band
  description: job-cutthroat-desc
  playTimeTracker: JobCutthroat
  whitelisted: true
  requirements:
    - !type:SpeciesRequirement
      species:
      - Human
      - Dwarf
  startingGear: BandGear
  supervisors: job-cutthroat-supervisor
  canBeAntag: false
  special:
    - !type:AddComponentSpecial
      components:
        - type: Access
          tags:
            - Bandit
            - BanditHead
        - type: Bands
          band: Stalker
          bandIcon: band
          bandProto: STBanditsBand
          bandRankId: 2
        - type: BlockTackingHolyItems
        - type: TeethPull
          teethProto: ToothStalker
          pullingItemTag: PliersStalker
          teethCount: 3
          initialTeeth: 3
        - type: NpcFactionMember
          factions:
          - BandsUnion
          - Bandit
        - type: Vocal
          sounds:
            Male: MaleHumanBandit
            Female: FemaleHumanBandit
            Unsexed: MaleHumanBandit
        - type: CheekiBreeki

